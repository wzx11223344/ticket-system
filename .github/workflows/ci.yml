name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.11"]
      fail-fast: false

    steps:
      - uses: actions/checkout@v4

      - name: 设置 Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: 安装依赖
        run: |
          python -m pip install --upgrade pip
          pip install flask pytest flake8

      - name: 代码风格检查 (flake8)
        run: |
          flake8 tms/ tests/ app.py --max-line-length=100 --exclude=.git,__pycache__,data

      - name: 运行测试 (pytest)
        run: |
          python -m pytest tests/ -v --tb=short

      - name: CLI 集成测试
        run: |
          python app.py create --title "CI集成测试工单" --desc "由CI自动创建" --priority low --assignee CI
          python app.py list
          python app.py stats
          python app.py board
